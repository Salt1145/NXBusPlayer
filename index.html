            }
        }
        const routes = [];
        if(upStations.length) routes.push({ routeId:`${folder}_up`, routeName:`${folder} 上行`, stations:upStations, audioBasePath:`${folder}/`, gpsDisabled:false, format:'bowen', dir:'up' });
        if(downStations.length) routes.push({ routeId:`${folder}_down`, routeName:`${folder} 下行`, stations:downStations, audioBasePath:`${folder}/`, gpsDisabled:false, format:'bowen', dir:'down' });
        return routes;
    }

    async function loadZhongAn(folder, info, progressCallback) {
        // 检查是否有 cu 文件（判定为中安格式）
        let hasCu = false;
        try { const cu = await fetch(`${folder}/001cu.mp3`, { method: 'HEAD' }); if (cu.ok) hasCu = true; } catch(e) {}
        if (!hasCu) return null;

        const csvData = await loadCsvData();
        if (!csvData) return null;
        let csvLine = findCsvLine(csvData, folder);
        if (!csvLine || (csvLine.upStations.length === 0 && csvLine.downStations.length === 0)) return null;

        // 根据 swapDirection 交换上下行
        if (info.swapDirection) {
            const temp = csvLine.upStations;
            csvLine.upStations = csvLine.downStations;
            csvLine.downStations = temp;
        }

        // 扫描 cu 文件数量（上行物理站数，不含起点）
        let cuCount = 0;
        let consecutive404 = 0;
        const maxScan = (info.upCount !== null && info.downCount !== null) ? Math.max(info.upCount, info.downCount) : 100;
        for (let i = 1; i <= maxScan; i++) {
            const pad = String(i).padStart(3, '0');
            try {
                const res = await fetch(`${folder}/${pad}cu.mp3`, { method: 'HEAD' });
                if (res.ok) cuCount++;
                else { consecutive404++; if (consecutive404 >= 3) break; }
            } catch(e) { consecutive404++; if (consecutive404 >= 3) break; }
        }
        if (cuCount === 0) return null;
        const M = cuCount;  // 上行物理站数（不含起点）

        // 辅助：从 CSV 获取站名和坐标（带备注）
        const getCsvStation = (csvStations, idx) => {
            if (idx >= csvStations.length) return null;
            const s = csvStations[idx];
            const { name, remark } = parseStationNameWithRemark(s.name);
            return { name, remark, lat: s.lat, lon: s.lon };
        };

        // ========== 构建上行站点 ==========
        const buildUpStations = () => {
            let filtered = csvLine.upStations.filter(s => !info.filterStops.includes(s.name));
            const stations = [];
            // 起点站（index 0）
            const startCsv = getCsvStation(filtered, 0);
            const startName = startCsv ? startCsv.name : "起点站";
            const startRemark = startCsv ? startCsv.remark : "";
            stations.push({
                index: 0,
                name: startName,
                remark: startRemark,
                type: '起点站',
                lat: startCsv?.lat || null, lon: startCsv?.lon || null,
                exitLat: startCsv?.lat || null, exitLon: startCsv?.lon || null,
                enterLat: null, enterLon: null,
                englishName: startName,
                enterAudio: null,
                exitAudio: '001cu'   // 起点站出站固定
            });
            // 物理站：第 1 站到第 M 站
            for (let i = 1; i <= M; i++) {
                const csvStation = getCsvStation(filtered, i);
                let stationName = csvStation ? csvStation.name : `第${i}站`;
                let remark = csvStation ? csvStation.remark : "";
                const stationType = (i === M) ? '终点站' : '小站';
                // 出站编号 = i+1
                const exitNum = i + 1;
                // 进站编号 = i+1
                const enterNum = i + 1;
                const exitAudio = `${String(exitNum).padStart(3,'0')}cu`;
                const enterAudio = `${String(enterNum).padStart(3,'0')}au+${String(enterNum).padStart(3,'0')}bu`;
                stations.push({
                    index: i,
                    name: stationName,
                    remark: remark,
                    type: stationType,
                    lat: csvStation?.lat || null, lon: csvStation?.lon || null,
                    exitLat: csvStation?.lat || null, exitLon: csvStation?.lon || null,
                    enterLat: csvStation?.lat || null, enterLon: csvStation?.lon || null,
                    englishName: stationName,
                    enterAudio: enterAudio,
                    exitAudio: exitAudio
                });
            }
            return stations;
        };

// ========== 构建下行站点（编号偏移）==========
const buildDownStations = () => {
    let filtered = csvLine.downStations.filter(s => !info.filterStops.includes(s.name));
    if (filtered.length === 0) return [];
    const stations = [];
    // 下行起点站出站编号 = M + 1（不是 M+2）
    const startExitNum = M + 2;
    const startCsv = getCsvStation(filtered, 0);
    const startName = startCsv ? startCsv.name : "下行起点站";
    const startRemark = startCsv ? startCsv.remark : "";
    stations.push({
        index: 0,
        name: startName,
        remark: startRemark,
        type: '起点站',
        lat: startCsv?.lat || null, lon: startCsv?.lon || null,
        exitLat: startCsv?.lat || null, exitLon: startCsv?.lon || null,
        enterLat: null, enterLon: null,
        englishName: startName,
        enterAudio: null,
        exitAudio: `${String(startExitNum).padStart(3, '0')}cd`
    });
    // 下行物理站
    for (let i = 1; i <= M; i++) {
        const csvStation = getCsvStation(filtered, i);
        if (!csvStation) break;
        const stationName = csvStation.name;
        const remark = csvStation.remark;
        const stationType = (i === M) ? '终点站' : '小站';
        // ========== 修复点：出站编号 = startExitNum + i ==========
        const exitNum = startExitNum + i;
        // 进站编号 = startExitNum + i（与出站相同）
        const enterNum = startExitNum + i;
        const exitAudio = `${String(exitNum).padStart(3, '0')}cd`;
        const enterAudio = `${String(enterNum).padStart(3, '0')}ad+${String(enterNum).padStart(3, '0')}bd`;
        stations.push({
            index: i,
            name: stationName,
            remark: remark,
            type: stationType,
            lat: csvStation.lat, lon: csvStation.lon,
            exitLat: csvStation.lat, exitLon: csvStation.lon,
            enterLat: csvStation.lat, enterLon: csvStation.lon,
            englishName: stationName,
            enterAudio: enterAudio,
            exitAudio: exitAudio
        });
    }
    return stations;
};
        const routes = [];
        const upStations = buildUpStations();
        if (upStations.length) {
            routes.push({
                routeId: `${folder}_up`,
                routeName: `${folder} 上行`,
                stations: upStations,
                audioBasePath: `${folder}/`,
                gpsDisabled: false,
                format: 'zhongAn',
                dir: 'up'
            });
        }
        const downStations = buildDownStations();
        if (downStations.length) {
            routes.push({
                routeId: `${folder}_down`,
                routeName: `${folder} 下行`,
                stations: downStations,
                audioBasePath: `${folder}/`,
                gpsDisabled: false,
                format: 'zhongAn',
                dir: 'down'
            });
        }
        return routes;
    }

    async function loadBowenNoGps(folder, info, progressCallback) {
        // 检查是否有 au/ad 文件且没有 station.json、gps.txt 和 cu 文件
        let hasJson = false, hasGps = false, hasCu = false;
        try { const j = await fetch(`${folder}/station.json`, { method: 'HEAD' }); if (j.ok) hasJson = true; } catch(e) {}
        try { const g = await fetch(`${folder}/gps.txt`, { method: 'HEAD' }); if (g.ok) hasGps = true; } catch(e) {}
        try { const c = await fetch(`${folder}/001cu.mp3`, { method: 'HEAD' }); if (c.ok) hasCu = true; } catch(e) {}
        if (hasJson || hasGps || hasCu) return null;

        // 扫描 au/ad 文件
        let upAuKeys = [], downAdKeys = [], consecutive404 = 0;
        const maxScan = (info.upCount !== null && info.downCount !== null) ? Math.max(info.upCount, info.downCount) : 100;
        for (let i = 1; i <= maxScan; i++) {
            const pad = String(i).padStart(3, '0');
            let auOk = false, adOk = false;
            if (info.upCount === null || i <= info.upCount) {
                try { const res = await fetch(`${folder}/${pad}au.mp3`, { method: 'HEAD' }); if (res.ok) { upAuKeys.push(`${pad}au`); auOk = true; } } catch(e) {}
            }
            if (info.downCount === null || i <= info.downCount) {
                try { const res = await fetch(`${folder}/${pad}ad.mp3`, { method: 'HEAD' }); if (res.ok) { downAdKeys.push(`${pad}ad`); adOk = true; } } catch(e) {}
            }
            if (!auOk && !adOk) { consecutive404++; if (consecutive404 >= 3) break; } else consecutive404 = 0;
        }
        // 注意：即使没有扫描到任何音频文件，也不应该返回 null，因为可能只有 CSV 数据？但博闻格式至少要有音频文件
        if (upAuKeys.length === 0 && downAdKeys.length === 0) return null;

        const csvData = await loadCsvData();
        if (!csvData) return null;
        const csvLine = findCsvLine(csvData, folder);
        // 如果没有 CSV 数据，仍然可以生成线路（站名从音频元数据获取，但无坐标）
        // 但用户要求"无GPS无站名的博闻格式不能忽略"，所以即使没有 CSV，也生成无坐标的线路（gpsDisabled: true）
        const hasCsv = !!csvLine;

        // 辅助：从 CSV 获取站名和坐标（带备注）
        const getCsvStation = (csvStations, idx) => {
            if (!csvStations || idx >= csvStations.length) return null;
            const s = csvStations[idx];
            const { name, remark } = parseStationNameWithRemark(s.name);
            return { name, remark, lat: s.lat, lon: s.lon };
        };

        // ========== 解析上行音频元数据 ==========
        const upAuWithMeta = [];
        for (const key of upAuKeys) {
            const num = parseInt(key.match(/^\d+/)[0], 10);
            const url = `${folder}/${key}.mp3`;
            const meta = await readMp3Metadata(url);
            let chName = '', enName = '';
            if (meta) { chName = cleanStationName(meta.title); enName = cleanStationName(meta.artist); }
            if (!chName) chName = `第${num}站`;
            if (!enName) enName = `Station ${num}`;
            upAuWithMeta.push({ num, chName, enName });
            if (progressCallback) progressCallback(0, `扫描博闻无GPS ${folder}...`);
        }
        upAuWithMeta.sort((a,b)=>a.num-b.num);
        const physicalUpCount = upAuWithMeta.length;

        // 构建上行站点
        const upStations = [];
        // 起点站：名称从下行最后一个 ad 的元数据或 CSV 获取
        let virtualStartName = "起点站";
        if (downAdKeys.length > 0) {
            const lastAdKey = downAdKeys[downAdKeys.length - 1];
            const url = `${folder}/${lastAdKey}.mp3`;
            const meta = await readMp3Metadata(url);
            if (meta) virtualStartName = cleanStationName(meta.title);
        }
        let startCsv = null;
        if (hasCsv) startCsv = getCsvStation(csvLine.upStations, 0);
        const startName = (startCsv ? startCsv.name : virtualStartName);
        const startRemark = startCsv ? startCsv.remark : "";
        const startLat = startCsv ? startCsv.lat : null;
        const startLon = startCsv ? startCsv.lon : null;
        upStations.push({
            index: 0,
            name: startName,
            remark: startRemark,
            type: '起点站',
            exitLat: startLat, exitLon: startLon,
            enterLat: null, enterLon: null,
            englishName: startName,
            enterAudio: null,
            exitAudio: '001au'
        });

        for (let i = 0; i < physicalUpCount; i++) {
            const phys = upAuWithMeta[i];
            const stationIndex = i+1;
            const exitKey = String(stationIndex+1).padStart(3,'0')+'au';
            const enterKey = (stationIndex===1)?'001bu':String(stationIndex).padStart(3,'0')+'bu';
            // 从 CSV 获取站名和坐标
            let csvStation = null;
            if (hasCsv) csvStation = getCsvStation(csvLine.upStations, stationIndex);
            let stationName = phys.chName;
            let remark = "";
            let lat = null, lon = null;
            if (csvStation) {
                stationName = csvStation.name;
                remark = csvStation.remark;
                lat = csvStation.lat;
                lon = csvStation.lon;
            } else if (stationName.startsWith('第') && stationName.endsWith('站')) {
                // 如果元数据站名是"第X站"且无 CSV，保留原名，无坐标
            }
            const stationType = (i === physicalUpCount-1) ? '终点站' : '小站';
            upStations.push({
                index: stationIndex,
                name: stationName,
                remark: remark,
                type: stationType,
                exitLat: lat, exitLon: lon,
                enterLat: lat, enterLon: lon,
                englishName: phys.enName,
                enterAudio: enterKey,
                exitAudio: exitKey
            });
        }

        // ========== 下行站点 ==========
        const downAdWithMeta = [];
        for (const key of downAdKeys) {
            const num = parseInt(key.match(/^\d+/)[0], 10);
            const url = `${folder}/${key}.mp3`;
            const meta = await readMp3Metadata(url);
            let chName = '', enName = '';
            if (meta) { chName = cleanStationName(meta.title); enName = cleanStationName(meta.artist); }
            if (!chName) chName = `第${num}站`;
            if (!enName) enName = `Station ${num}`;
            downAdWithMeta.push({ num, chName, enName });
            if (progressCallback) progressCallback(0, `扫描博闻无GPS ${folder}...`);
        }
        downAdWithMeta.sort((a,b)=>a.num-b.num);
        const physicalDownCount = downAdWithMeta.length;

        const downStations = [];
        // 下行起点站名称：从上行终点站或 CSV 获取
        let downVirtualName = "下行起点站";
        if (upStations.length > 0) downVirtualName = upStations[upStations.length-1].name;
        let downStartCsv = null;
        if (hasCsv) downStartCsv = getCsvStation(csvLine.downStations, 0);
        const downStartName = downStartCsv ? downStartCsv.name : downVirtualName;
        const downStartRemark = downStartCsv ? downStartCsv.remark : "";
        const downStartLat = downStartCsv ? downStartCsv.lat : null;
        const downStartLon = downStartCsv ? downStartCsv.lon : null;
        const downStartNum = physicalUpCount + 1;
        downStations.push({
            index: 0,
            name: downStartName,
            remark: downStartRemark,
            type: '起点站',
            exitLat: downStartLat, exitLon: downStartLon,
            enterLat: null, enterLon: null,
            englishName: downStartName,
            enterAudio: null,
            exitAudio: `${String(downStartNum).padStart(3,'0')}ad`
        });

        for (let i = 0; i < physicalDownCount; i++) {
            const phys = downAdWithMeta[i];
            const stationIndex = i+1;
            const exitKey = String(downStartNum + stationIndex).padStart(3,'0')+'ad';
            const enterKey = (stationIndex===1)?String(downStartNum).padStart(3,'0')+'bd':String(downStartNum+stationIndex-1).padStart(3,'0')+'bd';
            let csvStation = null;
            if (hasCsv) csvStation = getCsvStation(csvLine.downStations, stationIndex);
            let stationName = phys.chName;
            let remark = "";
            let lat = null, lon = null;
            if (csvStation) {
                stationName = csvStation.name;
                remark = csvStation.remark;
                lat = csvStation.lat;
                lon = csvStation.lon;
            } else if (stationName.startsWith('第') && stationName.endsWith('站')) {
                // 保留原名
            }
            const stationType = (i === physicalDownCount-1) ? '终点站' : '小站';
            downStations.push({
                index: stationIndex,
                name: stationName,
                remark: remark,
                type: stationType,
                exitLat: lat, exitLon: lon,
                enterLat: lat, enterLon: lon,
                englishName: phys.enName,
                enterAudio: enterKey,
                exitAudio: exitKey
            });
        }

        const routes = [];
        if (upStations.length) {
            routes.push({
                routeId: `${folder}_up`,
                routeName: `${folder} 上行`,
                stations: upStations,
                audioBasePath: `${folder}/`,
                gpsDisabled: !hasCsv,  // 有 CSV 则启用 GPS，否则无 GPS
                format: 'bowen',
                dir: 'up'
            });
        }
        if (downStations.length) {
            routes.push({
                routeId: `${folder}_down`,
                routeName: `${folder} 下行`,
                stations: downStations,
                audioBasePath: `${folder}/`,
                gpsDisabled: !hasCsv,
                format: 'bowen',
                dir: 'down'
            });
        }
        return routes;
    }

    // ==================== APEP格式 ====================
    async function loadApep(folder, info) {
        const stationJsonUrl = `${folder}/station.json`;
        try {
            const resp = await fetch(stationJsonUrl);
            if (!resp.ok) return null;
            const data = await resp.json();
            const lineName = data.lineName || folder;
            const routes = [];
            if (data.up && data.up.length) {
                const stations = data.up.map((s, idx) => ({ index:idx, name:s.name, type:s.type, lat:s.lat, lon:s.lon, englishName:s.englishName||s.name, enterAudio:`a${String(idx+1).padStart(3,'0')}_up.mp3`, exitAudio:`l${String(idx+1).padStart(3,'0')}_up.mp3` }));
                routes.push({ routeId:`${folder}_up`, routeName:`${lineName} 上行`, stations, audioBasePath:`${folder}/`, gpsDisabled:false, format:'apep', dir:'up' });
            }
            if (data.down && data.down.length) {
                const stations = data.down.map((s, idx) => ({ index:idx, name:s.name, type:s.type, lat:s.lat, lon:s.lon, englishName:s.englishName||s.name, enterAudio:`a${String(idx+1).padStart(3,'0')}_down.mp3`, exitAudio:`l${String(idx+1).padStart(3,'0')}_down.mp3` }));
                routes.push({ routeId:`${folder}_down`, routeName:`${lineName} 下行`, stations, audioBasePath:`${folder}/`, gpsDisabled:false, format:'apep', dir:'down' });
            }
            return routes;
        } catch(e) { return null; }
    }

    // ==================== CSV后备（仅当其他格式都没有时使用，有GPS）====================
    async function loadCsvBackup(folder, info) {
        const csvData = await loadCsvData();
        if (!csvData) return null;
        const csvLine = findCsvLine(csvData, folder);
        if (!csvLine) return null;
        const routes = [];
        if (csvLine.upStations.length) {
            let filtered = csvLine.upStations.filter(s => !info.filterStops.includes(s.name));
            const stations = filtered.map((s, idx) => ({ index:idx, name:s.name, type:s.type, lat:s.lat, lon:s.lon, englishName:s.name, enterAudio:`a${String(idx+1).padStart(3,'0')}_up.mp3`, exitAudio:`l${String(idx+1).padStart(3,'0')}_up.mp3` }));
            if (stations.length) routes.push({ routeId:`${folder}_up`, routeName:`${folder} 上行`, stations, audioBasePath:`${folder}/`, gpsDisabled:false, format:'csv', dir:'up' });
        }
        if (csvLine.downStations.length) {
            let filtered = csvLine.downStations.filter(s => !info.filterStops.includes(s.name));
            const stations = filtered.map((s, idx) => ({ index:idx, name:s.name, type:s.type, lat:s.lat, lon:s.lon, englishName:s.name, enterAudio:`a${String(idx+1).padStart(3,'0')}_down.mp3`, exitAudio:`l${String(idx+1).padStart(3,'0')}_down.mp3` }));
            if (stations.length) routes.push({ routeId:`${folder}_down`, routeName:`${folder} 下行`, stations, audioBasePath:`${folder}/`, gpsDisabled:false, format:'csv', dir:'down' });
        }
        return routes;
    }

    // ==================== 凯伦格式（长文件名，无ID3，无GPS从CSV获取）====================
async function loadKarenFormat(folder, info, progressCallback) {
        // 检测: HEAD 001au-002-Up-Start.mp3 长文件名格式
        let detected = false;
        try { const d = await fetch(`${folder}/001au-002-Up-Start.mp3`, { method: 'HEAD' }); if (d.ok) detected = true; } catch(e) {}
        if (!detected) return null;

        const csvData = await loadCsvData();
        const csvLine = findCsvLine(csvData, folder);
        const hasCsv = !!csvLine;

        const getCsvStation = (csvStations, idx) => {
            if (!csvStations || idx >= csvStations.length) return null;
            const s = csvStations[idx];
            const { name, remark } = parseStationNameWithRemark(s.name);
            return { name, remark, lat: s.lat, lon: s.lon };
        };

        // ========== 扫描上行 au 文件（确定站数）==========
        let upAuKeys = [], consecutive404 = 0;
        const maxScan = (info.upCount !== null) ? info.upCount : 100;
        for (let i = 1; i <= maxScan; i++) {
            const pad = String(i).padStart(3, '0');
            const next = String(i + 1).padStart(3, '0');
            try {
                const res = await fetch(`${folder}/${pad}au-${next}-Up-Start.mp3`, { method: 'HEAD' });
                if (res.ok) { upAuKeys.push(i); consecutive404 = 0; }
                else { consecutive404++; if (consecutive404 >= 3) break; }
            } catch(e) { consecutive404++; if (consecutive404 >= 3) break; }
            if (progressCallback) progressCallback(0, `扫描凯伦格式 ${folder}...`);
        }
        if (upAuKeys.length === 0) return null;

        // 凯伦没有ID3，站名全靠CSV，无CSV就用第X站
        const totalUpStations = upAuKeys.length + 1;

        // ========== 构建上行站点 ==========
        const upStations = [];
        for (let i = 0; i < totalUpStations; i++) {
            const csvInfo = hasCsv ? getCsvStation(csvLine.upStations, i) : null;
            const stationName = csvInfo ? csvInfo.name : (i === 0 ? '起点站' : `第${i}站`);
            const remark = csvInfo ? csvInfo.remark : "";
            const lat = csvInfo ? csvInfo.lat : null;
            const lon = csvInfo ? csvInfo.lon : null;

            let enterAudio = null, exitAudio = null;
            if (i === 0) {
                exitAudio = '001au-002-Up-Start.mp3';
            } else {
                enterAudio = `${String(i).padStart(3, '0')}bu-${String(i + 1).padStart(3, '0')}-Up-Arrive.mp3`;
                if (i < totalUpStations - 1) {
                    exitAudio = `${String(i + 1).padStart(3, '0')}au-${String(i + 2).padStart(3, '0')}-Up-Start.mp3`;
                }
            }
            const stationType = i === 0 ? '起点站' : (i === totalUpStations - 1 ? '终点站' : '小站');
            upStations.push({
                index: i, name: stationName, type: stationType,
                remark, lat, lon,
                exitLat: lat, exitLon: lon, enterLat: lat, enterLon: lon,
                englishName: csvInfo ? csvInfo.name : stationName,
                enterAudio, exitAudio
            });
        }

        // ========== 扫描下行 ad 文件 ==========
        let downAdKeys = [];
        consecutive404 = 0;
        const downMax = info.downCount !== null ? info.downCount : 100;
        const startSeq = upAuKeys.length + 1;
        const upCount = upAuKeys.length;
        for (let i = startSeq; i <= startSeq + downMax; i++) {
            const pad = String(i).padStart(3, '0');
            // ad 文件名的 dest 数字 = upCount - (i - startSeq)，即递减序列
            const k = i - startSeq;
            const dest = upCount - k;
            if (dest < 1) break;
            const destPad = String(dest).padStart(3, '0');
            try {
                const res = await fetch(`${folder}/${pad}ad-${destPad}-Dn-Start.mp3`, { method: 'HEAD' });
                if (res.ok) { downAdKeys.push(i); consecutive404 = 0; }
                else { consecutive404++; if (consecutive404 >= 3) break; }
            } catch(e) { consecutive404++; if (consecutive404 >= 3) break; }
            if (progressCallback) progressCallback(0, `扫描凯伦格式 ${folder}...`);
        }

        // ========== 构建下行站点 ==========
        const downStations = [];
        if (downAdKeys.length > 0) {
            const totalDownStations = downAdKeys.length + 1;

            for (let i = 0; i < totalDownStations; i++) {
                const csvInfo = hasCsv ? getCsvStation(csvLine.downStations, i) : null;
                const stationName = csvInfo ? csvInfo.name : (i === 0 ? '下行起点站' : `第${i}站`);
                const remark = csvInfo ? csvInfo.remark : "";
                const lat = csvInfo ? csvInfo.lat : null;
                const lon = csvInfo ? csvInfo.lon : null;

                let enterAudio = null, exitAudio = null;
                if (i === 0) {
                    const firstAdSeq = downAdKeys[0];
                    const dest = upCount;
                    exitAudio = `${String(firstAdSeq).padStart(3, '0')}ad-${String(dest).padStart(3, '0')}-Dn-Start.mp3`;
                } else {
                    const prevAdSeq = downAdKeys[i - 1];
                    const destForEnter = upCount - (i - 1);
                    enterAudio = `${String(prevAdSeq).padStart(3, '0')}bd-${String(destForEnter).padStart(3, '0')}-Dn-Arrive.mp3`;
                    if (i < totalDownStations - 1) {
                        const curAdSeq = downAdKeys[i];
                        const destForExit = upCount - i;
                        exitAudio = `${String(curAdSeq).padStart(3, '0')}ad-${String(destForExit).padStart(3, '0')}-Dn-Start.mp3`;
                    }
                }
                const stationType = i === 0 ? '起点站' : (i === totalDownStations - 1 ? '终点站' : '小站');
                downStations.push({
                    index: i, name: stationName, type: stationType,
                    remark, lat, lon,
                    exitLat: lat, exitLon: lon, enterLat: lat, enterLon: lon,
                    englishName: csvInfo ? csvInfo.name : stationName,
                    enterAudio, exitAudio
                });
            }
        }

        const routes = [];
        if (upStations.length) {
            routes.push({
                routeId: `${folder}_up`, routeName: `${folder} 上行`,
                stations: upStations, audioBasePath: `${folder}/`,
                gpsDisabled: !hasCsv, format: 'karen', dir: 'up'
            });
        }
        if (downStations.length) {
            routes.push({
                routeId: `${folder}_down`, routeName: `${folder} 下行`,
                stations: downStations, audioBasePath: `${folder}/`,
                gpsDisabled: !hasCsv, format: 'karen', dir: 'down'
            });
        }
        return routes;
    }


    // ==================== KL格式（kl.json，数据同APEP，音频用凯伦算法）====================
    async function loadKlFormat(folder, info, progressCallback) {
        const klUrl = `${folder}/kl.json`;
        try {
            const resp = await fetch(klUrl);
            if (!resp.ok) return null;
            const data = await resp.json();
            if (!data.up && !data.down) return null;

            const lineName = data.lineName || folder;
            const routes = [];

            // 上行（凯伦音频命名）
            if (data.up && data.up.length) {
                const upTotal = data.up.length;
                const stations = [];
                for (let idx = 0; idx < upTotal; idx++) {
                    const s = data.up[idx];
                    let enterAudio = null, exitAudio = null;
                    if (idx === 0) {
                        exitAudio = '001au-002-Up-Start.mp3';
                    } else {
                        enterAudio = `${String(idx).padStart(3, '0')}bu-${String(idx + 1).padStart(3, '0')}-Up-Arrive.mp3`;
                        if (idx < upTotal - 1) {
                            exitAudio = `${String(idx + 1).padStart(3, '0')}au-${String(idx + 2).padStart(3, '0')}-Up-Start.mp3`;
                        }
                    }
                    stations.push({
                        index: idx,
                        name: s.name,
                        type: s.type || (idx === 0 ? '起点站' : (idx === upTotal - 1 ? '终点站' : '小站')),
                        lat: s.lat || null,
                        lon: s.lon || null,
                        englishName: s.englishName || s.name,
                        enterAudio,
                        exitAudio
                    });
                }
                routes.push({
                    routeId: `${folder}_up`,
                    routeName: `${lineName} 上行`,
                    stations,
                    audioBasePath: `${folder}/`,
                    gpsDisabled: false,
                    format: 'karen',
                    dir: 'up'
                });
            }

            // 下行（凯伦音频命名，编号续接上行）
            const upTotal = (data.up && data.up.length) ? data.up.length : 0;
            const physicalUpCount = Math.max(0, upTotal - 1);
            if (data.down && data.down.length) {
                const downTotal = data.down.length;
                const stations = [];
                for (let idx = 0; idx < downTotal; idx++) {
                    const s = data.down[idx];
                    let enterAudio = null, exitAudio = null;
                    if (idx === 0) {
                        exitAudio = `${String(upTotal).padStart(3, '0')}ad-${String(physicalUpCount).padStart(3, '0')}-Dn-Start.mp3`;
                    } else {
                        enterAudio = `${String(upTotal + idx - 1).padStart(3, '0')}bd-${String(physicalUpCount - idx + 1).padStart(3, '0')}-Dn-Arrive.mp3`;
                        if (idx < downTotal - 1) {
                            exitAudio = `${String(upTotal + idx).padStart(3, '0')}ad-${String(physicalUpCount - idx).padStart(3, '0')}-Dn-Start.mp3`;
                        }
                    }
                    stations.push({
                        index: idx,
                        name: s.name,
                        type: s.type || (idx === 0 ? '起点站' : (idx === downTotal - 1 ? '终点站' : '小站')),
                        lat: s.lat || null,
                        lon: s.lon || null,
                        englishName: s.englishName || s.name,
                        enterAudio,
                        exitAudio
                    });
                }
                routes.push({
                    routeId: `${folder}_down`,
                    routeName: `${lineName} 下行`,
                    stations,
                    audioBasePath: `${folder}/`,
                    gpsDisabled: false,
                    format: 'karen',
                    dir: 'down'
                });
            }

            if (progressCallback) progressCallback(0, `加载KL格式 ${folder}...`);
            return routes;
        } catch(e) {
            return null;
        }
    }

    // ==================== 主加载（优先级控制）====================
    let allRoutes = [], currentRouteIndex = 0;
    function getAllRoutes() { return allRoutes; }
    function getCurrentRoute() { return allRoutes[currentRouteIndex]; }
    let isLoading = false;

    // 单个文件夹加载（尝试所有格式优先级）
    async function loadSingleFolder(folder, item, progressCallback) {
        let routes = null;
        routes = await loadApepTypeB(folder, item, progressCallback);
        if (routes && routes.length) return routes;
        routes = await loadApep(folder, item);
        if (routes && routes.length) return routes;
        routes = await loadBowenGps(folder, item, progressCallback);
        if (routes && routes.length) return routes;
        routes = await loadZhongAn(folder, item, progressCallback);
        if (routes && routes.length) return routes;
        routes = await loadBowenNoGps(folder, item, progressCallback);
        if (routes && routes.length) return routes;
        routes = await loadKlFormat(folder, item, progressCallback);
        if (routes && routes.length) return routes;
        routes = await loadKarenFormat(folder, item, progressCallback);
        if (routes && routes.length) return routes;
        routes = await loadCsvBackup(folder, item);
        if (routes && routes.length) return routes;
        return [];
    }

    async function loadAllRoutes(forceRescan = false, progressCallback) {
        if (isLoading) return;
        isLoading = true;
        try {
            const cacheKey = 'gps_bus_routes_cache_v30';
            const lineListItems = await getLineListItems();
            if (!lineListItems.length) { console.error("linelist.txt为空"); return; }
            const lineListContent = JSON.stringify(lineListItems);
            if (!forceRescan) {
                // 尝试从缓存加载
                const cached = localStorage.getItem(cacheKey);
                if (cached) {
                    try {
                        const data = JSON.parse(cached);
                        if (data && data.linelistContent === lineListContent && Array.isArray(data.routes)) {
                            allRoutes = data.routes;
                            // 为缓存中缺失的文件夹创建桩条目
                            const cachedFolders = new Set();
                            for (const r of allRoutes) {
                                if (!r._stub) {
                                    const f = r.routeId.replace(/_(up|down)$/, '');
                                    cachedFolders.add(f);
                                }
                            }
                            let added = 0;
                            for (const item of lineListItems) {
                                if (!cachedFolders.has(item.folder)) {
                                    allRoutes.push(createStubEntry(item.folder, item));
                                    added++;
                                }
                            }
                            if (progressCallback) progressCallback(100, added ? `已从缓存加载（新增 ${added} 个未扫描线路）` : "已从缓存加载线路");
                            return;
                        }
                    } catch(e) {}
                }
                // 无缓存：所有线路以未扫描状态列出
                if (progressCallback) progressCallback(0, "列出线路...");
                allRoutes = [];
                for (const item of lineListItems) {
                    allRoutes.push(createStubEntry(item.folder, item));
                }
                if (progressCallback) progressCallback(100, `列出 ${allRoutes.length} 条线路（全部未扫描）`);
                return;
            }
            // forceRescan: 全量扫描
            if (progressCallback) progressCallback(0, "正在全量扫描线路...");
            allRoutes = [];
            for (const item of lineListItems) {
                const routes = await loadSingleFolder(item.folder, item, progressCallback);
                if (routes && routes.length) {
                    allRoutes.push(...routes);
                } else {
                    allRoutes.push(createStubEntry(item.folder, item));
                }
            }
            // 卡密格式（全局）
            try {
                const kamiResp = await fetch('bzmnq.json');
                if (kamiResp.ok) {
                    const kamiData = await kamiResp.json();
                    if (Array.isArray(kamiData)) {
                        for (const route of kamiData) {
                            let dir = 'up'; if (route.routeId && route.routeId.endsWith('_down')) dir = 'down';
                            const fullName = route.routeName || route.routeId || '未命名';
                            const stations = (route.stations || []).map((s, idx) => ({ index:idx, name:s.stationName, type:s.stationType, lat:s.lat!==undefined?s.lat:(s.enterGps?parseFloat(s.enterGps.split(' ')[0]):null), lon:s.lon!==undefined?s.lon:(s.enterGps?parseFloat(s.enterGps.split(' ')[1]):null), englishName:s.exitExt||s.stationName, enterAudio:s.enterAudioFile||'', exitAudio:s.exitAudioFile||'' }));
                            allRoutes.push({ routeId:route.routeId, routeName:fullName, stations, audioBasePath:'audio/', gpsDisabled:route.gpsDisabled===true, format:'kami', dir });
                        }
                    }
                }
            } catch(e) { console.warn("加载卡密失败"); }
            console.log(`共加载 ${allRoutes.length} 条线路`);
            const cacheData = { routes: allRoutes, linelistContent: lineListContent };
            localStorage.setItem(cacheKey, JSON.stringify(cacheData));
            if (progressCallback) progressCallback(100, "加载完成");
        } finally { isLoading = false; }
    }

    // ==================== 公交业务核心（音频播放、状态机等）====================
    let lineData = { lineName: "未知线路", up: [], down: [] };
    let currentDir = 'up';
    let currentStation = 0;
    let currentPhase = 'arrived';
    let targetStation = 1;
    let autoEntered = new Set();
    let autoLeft = new Set();
    let currentAudio = null;
    let currentAudioList = [];
    let currentAudioBasePath = 'audio/';
    let gpsDisabledForCurrentRoute = false;
    let generalSensitivity = 70, exitSensitivity = 70, enterSensitivity = 70;

    function getCurrentStationList() { return currentDir === 'up' ? lineData.up : lineData.down; }
    function getCurrentRouteObj() { return allRoutes[currentRouteIndex]; }

    const FORMAT_NAMES = {
        apepTypeB: 'APEP TypeB', apep: 'APEP', bowen: '博闻',
        zhongAn: '中安', karen: '凯伦', kami: '卡密',
        csv: 'CSV', stub: '未扫描'
    };
    function getFormatName(route) {
        if (!route) return '--';
        if (route._stub) return '未扫描';
        return FORMAT_NAMES[route.format] || route.format || '--';
    }

    // 缓存保存辅助
    async function saveRouteCache() {
        const lineListItems = await getLineListItems();
        if (!lineListItems.length) return;
        const lineListContent = JSON.stringify(lineListItems);
        const cacheData = { routes: allRoutes, linelistContent: lineListContent };
        localStorage.setItem('gps_bus_routes_cache_v30', JSON.stringify(cacheData));
    }

    function stopAllAudio() {
        if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio = null; }
        for (let a of currentAudioList) { a.pause(); a.currentTime = 0; }
        currentAudioList = [];
    }

    function playZhongAnEnter(station) {
        if (!station.enterAudio) return;
        const parts = station.enterAudio.split('+');
        if (parts.length !== 2) return;
        const url1 = `${currentAudioBasePath}${parts[0]}.mp3`;
        const url2 = `${currentAudioBasePath}${parts[1]}.mp3`;
        const audio1 = new Audio(url1);
        const audio2 = new Audio(url2);
        currentAudioList = [audio1, audio2];
        audio1.play().catch(e=>console.warn);
        audio1.onended = () => { audio2.play().catch(e=>console.warn); };
        currentAudio = audio1;
    }

    function playAudio(type, stationIdx) {
        stopAllAudio();
        const route = getCurrentRouteObj();
        if (!route) return;
        const stationList = getCurrentStationList();
        const station = stationList[stationIdx];
        if (!station) return;
        let filename = '';
        const dirCode = currentDir === 'up' ? 'up' : 'down';
        
        if (route.format === 'bowen') {
            const key = (type === 'depart') ? station.exitAudio : station.enterAudio;
            if (!key) return;
            filename = `${key}.mp3`;
        } else if (route.format === 'apep' || route.format === 'csv') {
            const audioNum = stationIdx + 1;
            const prefix = (type === 'depart') ? 'l' : 'a';
            filename = `${prefix}${String(audioNum).padStart(3, '0')}_${dirCode}.mp3`;
        } else if (route.format === 'apepTypeB') {
            // APEP TypeB 使用博闻文件名算法
            if (type === 'depart') {
                if (station.exitAudio) {
                    filename = `${station.exitAudio}.mp3`;
                } else {
                    // 终点站没有出站音频
                    return;
                }
            } else {
                if (station.enterAudio) {
                    filename = `${station.enterAudio}.mp3`;
                } else {
                    // 起点站没有进站音频
                    return;
                }
            }
        } else if (route.format === 'kami') {
            filename = (type === 'depart') ? station.exitAudio : station.enterAudio;
            if (!filename) return;
        } else if (route.format === 'karen') {
            filename = (type === 'depart') ? station.exitAudio : station.enterAudio;
            if (!filename) return;
        } else if (route.format === 'zhongAn') {
            if (type === 'depart') {
                filename = `${station.exitAudio}.mp3`;
            } else {
                playZhongAnEnter(station);
                return;
            }
        } else {
            filename = (type === 'depart') ? station.exitAudio : station.enterAudio;
            if (!filename) return;
        }
        const audioUrl = `${currentAudioBasePath}${filename}`;
        console.log(`[播放音频] ${type} | ${route.routeName} | ${route.format} | ${audioUrl}`);
        const audio = new Audio(audioUrl);
        audio.play().catch(e => console.warn("音频播放失败:", audioUrl, e));
        currentAudio = audio;
    }

    function showWelcomeMessage() {
        const stationList = getCurrentStationList();
        if (stationList.length === 0) return;
        const endStation = stationList[stationList.length-1];
        const endName = endStation.name;
        let routeName = getCurrentRouteObj()?.routeName || lineData.lineName;
        routeName = routeName.replace(/\s*(上行|下行)$/, '');
        const welcomeText = `乘客们，你们好，您现在乘坐的是${routeName}公交车，方向${endName}，上车请主动买票，文明规范乘车从你我做起。`;
        startWelcomeLoop(welcomeText);
    }

    function replayAnnouncement() {
        stopAllAudio();
        stopWelcomeLoop();
        const stationList = getCurrentStationList();
        if (currentStation === 0 && currentPhase === 'arrived') { showWelcomeMessage(); return; }
        if (currentPhase === 'arrived') {
            const station = stationList[currentStation];
            if (station) { playAudio('arrive', currentStation); startDisplayLoop(`${station.name} 到了`, `We are arriving at ${station.englishName}`); }
        } else if (currentPhase === 'departed') {
            const nextStation = stationList[targetStation];
            if (nextStation) { playAudio('depart', currentStation); startDisplayLoop(`下一站 ${nextStation.name}`, `Next stop is ${nextStation.englishName}`); }
        }
    }

    function performDepart() {
        const stationList = getCurrentStationList();
        if (currentStation >= stationList.length-1) { switchToOppositeRoute(); return; }
        const nextIdx = currentStation+1;
        const nextStation = stationList[nextIdx];
        if (!nextStation) return;
        stopWelcomeLoop();
        playAudio('depart', currentStation);
        startDisplayLoop(`下一站 ${nextStation.name}`, `Next stop is ${nextStation.englishName}`);
        currentPhase = 'departed';
        targetStation = nextIdx;
        updateUI();
        console.log(`[出站] 前往 ${nextStation.name}`);
    }

    function performArrive() {
        const stationList = getCurrentStationList();
        if (targetStation >= stationList.length) return;
        const station = stationList[targetStation];
        if (!station) return;
        stopWelcomeLoop();
        playAudio('arrive', targetStation);
        startDisplayLoop(`${station.name} 到了`, `We are arriving at ${station.englishName}`);
        currentStation = targetStation;
        currentPhase = 'arrived';
        targetStation = currentStation + 1;
        if (getCurrentRouteObj()?.format !== 'bowen') autoEntered.clear();
        updateUI();
        console.log(`[进站] 到达 ${station.name}`);
    }

    function forceJumpToStation(idx) {
        const stationList = getCurrentStationList();
        if (idx < 0 || idx >= stationList.length) return;
        stopAllAudio();
        stopWelcomeLoop();
        stopDisplayLoop();
        currentStation = idx;
        currentPhase = 'arrived';
        targetStation = currentStation + 1;
        const station = stationList[idx];
        if (idx === 0) showWelcomeMessage();
        else { playAudio('arrive', idx); startDisplayLoop(`${station.name} 到了`, `We are arriving at ${station.englishName}`); }
        updateUI();
        console.log(`[强制跳站] 跳到 ${station.name}`);
    }

    function manualNext() { if (currentPhase === 'arrived') performDepart(); else if (currentPhase === 'departed') performArrive(); }
    function switchDirection() { switchToOppositeRoute(); }
    function interruptAudio() { stopAllAudio(); }
    function jumpToStation(idx) { forceJumpToStation(idx); }

    function switchToOppositeRoute() {
        const currentId = getCurrentRouteObj()?.routeId || '';
        let oppositeId = '';
        if (currentId.endsWith('_up')) oppositeId = currentId.slice(0, -3) + '_down';
        else if (currentId.endsWith('_down')) oppositeId = currentId.slice(0, -5) + '_up';
        if (oppositeId) {
            const idx = allRoutes.findIndex(r => r.routeId === oppositeId);
            if (idx !== -1) { routeSelect.selectedIndex = idx; switchToRoute(idx); return; }
        }

        if (currentDir === 'up') { lineData.up = route.stations; lineData.down = []; }
        else { lineData.up = []; lineData.down = route.stations; }

    // ==================== GPS 自动触发 ====================
    let watchId = null, lastPos = null, currentSpeed = 0, avgSpeed = 0, speedHistory = [];
    const SPEED_HISTORY_LEN = 5;
    let currentLat = null, currentLon = null, gpsConnectedFlag = false;

    function haversineDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // ==================== 坐标系转换 WGS-84 ↔ GCJ-02 ====================
    const COORD_PI = Math.PI;
    const COORD_A = 6378245.0;
    const COORD_EE = 0.00669342162296594323;
    let useGcj02 = false; // 默认 WGS-84

    function outOfChina(lat, lon) {
        return lon < 72.004 || lon > 137.8347 || lat < 0.8293 || lat > 55.8271;
    }

    function transformLat(x, y) {
        let ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
        ret += (20.0 * Math.sin(6.0 * x * COORD_PI) + 20.0 * Math.sin(2.0 * x * COORD_PI)) * 2.0 / 3.0;
        ret += (20.0 * Math.sin(y * COORD_PI) + 40.0 * Math.sin(y / 3.0 * COORD_PI)) * 2.0 / 3.0;
        ret += (160.0 * Math.sin(y / 12.0 * COORD_PI) + 320.0 * Math.sin(y * COORD_PI / 30.0)) * 2.0 / 3.0;
        return ret;
    }

    function transformLon(x, y) {
        let ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
        ret += (20.0 * Math.sin(6.0 * x * COORD_PI) + 20.0 * Math.sin(2.0 * x * COORD_PI)) * 2.0 / 3.0;
        ret += (20.0 * Math.sin(x * COORD_PI) + 40.0 * Math.sin(x / 3.0 * COORD_PI)) * 2.0 / 3.0;
        ret += (150.0 * Math.sin(x / 12.0 * COORD_PI) + 300.0 * Math.sin(x / 30.0 * COORD_PI)) * 2.0 / 3.0;
        return ret;
    }

    function wgs84ToGcj02(wgsLat, wgsLon) {
        if (outOfChina(wgsLat, wgsLon)) return { lat: wgsLat, lon: wgsLon };
        let dLat = transformLat(wgsLon - 105.0, wgsLat - 35.0);
        let dLon = transformLon(wgsLon - 105.0, wgsLat - 35.0);
        let radLat = wgsLat / 180.0 * COORD_PI;
        let magic = Math.sin(radLat);
        magic = 1 - COORD_EE * magic * magic;
        let sqrtMagic = Math.sqrt(magic);
        dLat = (dLat * 180.0) / ((COORD_A * (1 - COORD_EE)) / (magic * sqrtMagic) * COORD_PI);
        dLon = (dLon * 180.0) / (COORD_A / sqrtMagic * Math.cos(radLat) * COORD_PI);
        return { lat: wgsLat + dLat, lon: wgsLon + dLon };
    }

    function gcj02ToWgs84(gcjLat, gcjLon) {
        if (outOfChina(gcjLat, gcjLon)) return { lat: gcjLat, lon: gcjLon };
        let wgs = wgs84ToGcj02(gcjLat, gcjLon);
        return { lat: 2 * gcjLat - wgs.lat, lon: 2 * gcjLon - wgs.lon };
    }

    // GPS 坐标转有效坐标：如果数据源是 GCJ-02 则转 GPS（WGS-84→GCJ-02），用于距离计算
    function toEffectiveCoords(lat, lon) {
        if (useGcj02 && lat != null && lon != null) {
            return wgs84ToGcj02(lat, lon);
        }
        return { lat, lon };
    }

    function coordDisplay(lat, lon) {
        if (lat == null || lon == null) return '--';
        if (useGcj02) {
            const g = wgs84ToGcj02(lat, lon);
            return `${g.lat.toFixed(6)},${g.lon.toFixed(6)}`;
        }
        return `${lat.toFixed(6)},${lon.toFixed(6)}`;
    }

    function updateSpeed(gpsSpeed, lat, lon, timestamp) {
        if (gpsSpeed !== null && !isNaN(gpsSpeed) && gpsSpeed >= 0) {
            currentSpeed = gpsSpeed * 3.6;
            speedStatusSpan.innerText = `速度: ${currentSpeed.toFixed(1)} km/h`;
            speedHistory.push(currentSpeed);
            if (speedHistory.length > SPEED_HISTORY_LEN) speedHistory.shift();
            avgSpeed = speedHistory.reduce((a,b)=>a+b,0) / speedHistory.length;
        } else { speedStatusSpan.innerText = `速度: -- km/h`; }
        if (lastPos && lastPos.timestamp && timestamp) {
            const dt = (timestamp - lastPos.timestamp) / 1000;
            if (dt > 0.1 && dt < 5) {
                const dist = haversineDistance(lastPos.lat, lastPos.lon, lat, lon);
                const speedMs = dist / dt;
                if (speedMs >= 0 && speedMs < 50) {
                    const calcSpeed = speedMs * 3.6;
                    speedHistory.push(calcSpeed);
                    if (speedHistory.length > SPEED_HISTORY_LEN) speedHistory.shift();
                    avgSpeed = speedHistory.reduce((a,b)=>a+b,0) / speedHistory.length;
                }
            }
        }
        lastPos = { lat, lon, timestamp };
    }

    function playGPSConnectionSound() {
        if (gpsConnectedFlag) return;
        gpsConnectedFlag = true;
        const a1 = new Audio('voice/888.mp3');
        a1.play().catch(e=>console.warn);
        a1.onended = () => { const a2 = new Audio('voice/999.mp3'); a2.play().catch(e=>console.warn); };
    }

function checkGPSAutoTrigger(lat, lon) {
    if (gpsDisabledForCurrentRoute) return;
    
    const route = getCurrentRouteObj();
    const stationList = getCurrentStationList();
    if (stationList.length === 0) return;
    
    // ========== 坐标系处理：CSV 线路强制使用 GCJ-02 转换 ==========
    let effectiveLat = lat, effectiveLon = lon;
    
    // 如果当前线路是 CSV 格式（坐标来自 CSV 文件），GPS 坐标需要转换到 GCJ-02 才能匹配
    if (route && route.format === 'csv') {
        const converted = wgs84ToGcj02(lat, lon);
        effectiveLat = converted.lat;
        effectiveLon = converted.lon;
    } else if (useGcj02) {
        // 用户手动开启的 GCJ-02 模式
        const converted = wgs84ToGcj02(lat, lon);
        effectiveLat = converted.lat;
        effectiveLon = converted.lon;
    }
    
    lat = effectiveLat;
    lon = effectiveLon;
    
    // ========== 博闻格式：点触发 ==========
    if (route?.format === 'bowen') {
        let triggered = false;
        for (let i=0;i<stationList.length;i++) {
            const s = stationList[i];
            const exitLat = s.exitLat !== undefined ? s.exitLat : s.lat;
            const exitLon = s.exitLon !== undefined ? s.exitLon : s.lon;
            const enterLat = s.enterLat !== undefined ? s.enterLat : s.lat;
            const enterLon = s.enterLon !== undefined ? s.enterLon : s.lon;
            
            if (exitLat != null && exitLon != null) {
                const dist = haversineDistance(lat, lon, exitLat, exitLon);
                if (!triggered) distanceStatusSpan.innerText = `距离: ${s.name} 出口 ${Math.round(dist)}m`;
                if (dist <= exitSensitivity && !autoLeft.has(i)) {
                    autoLeft.add(i);
                    if (currentStation !== i || currentPhase !== 'arrived') forceJumpToStation(i);
                    performDepart();
                    triggered = true; return;
                } else if (dist > exitSensitivity && autoLeft.has(i)) autoLeft.delete(i);
            }
        }
        for (let i=0;i<stationList.length;i++) {
            const s = stationList[i];
            const enterLat = s.enterLat !== undefined ? s.enterLat : s.lat;
            const enterLon = s.enterLon !== undefined ? s.enterLon : s.lon;
            if (enterLat != null && enterLon != null && !triggered) {
                const dist = haversineDistance(lat, lon, enterLat, enterLon);
                if (!triggered) distanceStatusSpan.innerText = `距离: ${s.name} 入口 ${Math.round(dist)}m`;
                if (dist <= enterSensitivity && !autoEntered.has(i)) {
                    autoEntered.add(i);
                    forceJumpToStation(i);
                    triggered = true; return;
                } else if (dist > enterSensitivity && autoEntered.has(i)) autoEntered.delete(i);
            }
        }
        if (!triggered) {
            let minDist = Infinity, nearestName = '', nearestType = '';
            for (let s of stationList) {
                const exitLat = s.exitLat !== undefined ? s.exitLat : s.lat;
                const exitLon = s.exitLon !== undefined ? s.exitLon : s.lon;
                const enterLat = s.enterLat !== undefined ? s.enterLat : s.lat;
                const enterLon = s.enterLon !== undefined ? s.enterLon : s.lon;
                if (exitLat != null) { const d = haversineDistance(lat,lon,exitLat,exitLon); if (d<minDist) { minDist=d; nearestName=s.name; nearestType='出口'; } }
                if (enterLat != null) { const d = haversineDistance(lat,lon,enterLat,enterLon); if (d<minDist) { minDist=d; nearestName=s.name; nearestType='入口'; } }
            }
            if (minDist !== Infinity) distanceStatusSpan.innerText = `距离: ${nearestName} ${nearestType} ${Math.round(minDist)}m`;
            else distanceStatusSpan.innerText = `距离: --`;
        }
        return;
    }
    
    // ========== 范围触发（APEP、APEP TypeB、CSV、中安、卡密、凯伦等）==========
    let nearestIdx = -1, minDist = Infinity;
    for (let i=0;i<stationList.length;i++) {
        const s = stationList[i];
        if (s.lat == null || s.lon == null) continue;
        const dist = haversineDistance(lat, lon, s.lat, s.lon);
        if (dist < minDist) { minDist = dist; nearestIdx = i; }
    }
    if (nearestIdx === -1) return;
    
    const station = stationList[nearestIdx];
    const isInside = minDist <= generalSensitivity;
    const isStart = (station.type === '起点站'), isEnd = (station.type === '终点站');
    
    distanceStatusSpan.innerText = `距离: ${station.name} ${minDist.toFixed(1)}m`;
    
    if (isStart) {
        if (!isInside && !autoLeft.has(nearestIdx)) {
            if (currentPhase === 'arrived' && currentStation === nearestIdx) { autoLeft.add(nearestIdx); performDepart(); }
        } else if (isInside) autoLeft.delete(nearestIdx);
        return;
    }
    
    if (isEnd) {
        if (isInside && !autoEntered.has(nearestIdx)) { autoEntered.add(nearestIdx); forceJumpToStation(nearestIdx); }
        else if (!isInside && autoEntered.has(nearestIdx)) { autoEntered.delete(nearestIdx); switchDirection(); }
        return;
    }
    
    if (isInside && !autoEntered.has(nearestIdx)) {
        if (currentPhase === 'arrived' && currentStation === nearestIdx) return;
        autoEntered.add(nearestIdx); forceJumpToStation(nearestIdx);
    } else if (!isInside && currentPhase === 'arrived' && currentStation === nearestIdx) {
        if (autoEntered.has(nearestIdx)) autoEntered.delete(nearestIdx);
        performDepart();
    }
}
    function updateNextStopProgress() {
        const stationList = getCurrentStationList();
        if (stationList.length === 0 || currentPhase !== 'departed' || targetStation >= stationList.length) {
            progressSection.style.display = 'none'; return;
        }
        const nextStation = stationList[targetStation];
        let targetLat = null, targetLon = null;
        const route = getCurrentRouteObj();
        if (route?.format === 'bowen' || route?.format === 'apepTypeB') {
            targetLat = nextStation.enterLat !== undefined ? nextStation.enterLat : nextStation.lat;
            targetLon = nextStation.enterLon !== undefined ? nextStation.enterLon : nextStation.lon;
        } else {
            targetLat = nextStation.lat;
            targetLon = nextStation.lon;
        }
        if (targetLat === null || targetLon === null || currentLat === null || currentLon === null) { progressSection.style.display = 'none'; return; }
        const gpsPos = toEffectiveCoords(currentLat, currentLon);
        if (gpsPos.lat === null || gpsPos.lon === null) { progressSection.style.display = 'none'; return; }
        const dist = haversineDistance(gpsPos.lat, gpsPos.lon, targetLat, targetLon);
        let startLat = null, startLon = null;
        const curStation = stationList[currentStation];
        if (route?.format === 'bowen' || route?.format === 'apepTypeB') {
            startLat = curStation.exitLat !== undefined ? curStation.exitLat : curStation.lat;
            startLon = curStation.exitLon !== undefined ? curStation.exitLon : curStation.lon;
        } else {
            startLat = curStation.lat;
            startLon = curStation.lon;
        }
        if (startLat === null || startLon === null) { progressSection.style.display = 'none'; return; }
        const totalDist = haversineDistance(startLat, startLon, targetLat, targetLon);
        if (totalDist <= 0) { progressSection.style.display = 'none'; return; }
        let percent = (1 - dist / totalDist) * 100;
        if (percent < 0) percent = 0; if (percent > 100) percent = 100;
        progressFill.style.width = percent + '%';
        progressPercentSpan.innerText = Math.round(percent) + '%';
        if (avgSpeed > 0.5) {
            const minutes = (dist / 1000) / avgSpeed * 60;
            if (minutes < 1) etaSpan.innerText = `剩余 ${Math.round(minutes * 60)} 秒`;
            else etaSpan.innerText = `剩余 ${Math.floor(minutes)} 分 ${Math.round((minutes % 1) * 60)} 秒`;
        } else etaSpan.innerText = `剩余 --`;
        progressSection.style.display = 'flex';
    }

    function startGPS() {
        if (!navigator.geolocation) { gpsStatusSpan.innerText = "GPS不支持"; return; }
        if (watchId) navigator.geolocation.clearWatch(watchId);
        watchId = navigator.geolocation.watchPosition(p => {
            const lat = p.coords.latitude, lon = p.coords.longitude, acc = p.coords.accuracy;
            const gpsSpeed = (p.coords.speed !== undefined && p.coords.speed !== null) ? p.coords.speed : null;
            const timestamp = p.timestamp;
            currentLat = lat; currentLon = lon;
            if (!gpsConnectedFlag && !gpsDisabledForCurrentRoute) playGPSConnectionSound();
            updateSpeed(gpsSpeed, lat, lon, timestamp);
            if (!gpsDisabledForCurrentRoute) {
                const coordLabel = useGcj02 ? 'GCJ-02' : 'WGS-84';
                gpsStatusSpan.innerText = `${coordLabel}: ${coordDisplay(lat, lon)} | 精度${acc.toFixed(1)}m | 通用:${generalSensitivity}m 出站:${exitSensitivity}m 进站:${enterSensitivity}m`;
                checkGPSAutoTrigger(lat, lon);
            } else {
                gpsStatusSpan.innerText = `GPS: 此线路无GPS (${coordDisplay(lat, lon)})`;
            }
            updateStationDistances();
            updateNextStopProgress();
        }, e => { gpsStatusSpan.innerText = `GPS错误`; }, { enableHighAccuracy: true, maximumAge: 1000 });

    function updateStationDistances() {
        const stationList = getCurrentStationList();
        if (stationList.length === 0) return;
        stationListDiv.innerHTML = '';
        const route = getCurrentRouteObj();
        // 距离计算用有效坐标（GCJ-02 时自动转）
        const gpsPos = toEffectiveCoords(currentLat, currentLon);
        stationList.forEach((s, i) => {
            let distText = '';
            let lat = null, lon = null;
            if (route?.format === 'bowen' || route?.format === 'apepTypeB') {
                lat = s.exitLat !== undefined ? s.exitLat : s.lat;
                lon = s.exitLon !== undefined ? s.exitLon : s.lon;
            } else {
                lat = s.lat;
                lon = s.lon;
            }
            if (gpsPos.lat != null && gpsPos.lon != null && lat != null && lon != null) {
                const dist = haversineDistance(gpsPos.lat, gpsPos.lon, lat, lon);
                distText = `${Math.round(dist)}m`;
            } else distText = '无坐标';
            let typeText = (s.type === '起点站') ? '起点站' : (s.type === '终点站') ? '终点站' : '';
            const coordStr = (lat != null && lon != null) ? coordDisplay(lat, lon) : '';
            const d = document.createElement('div');
            d.className = 'station-item';
            if (currentStation === i && currentPhase === 'arrived') d.classList.add('active');
            if (currentPhase === 'departed' && targetStation === i) d.classList.add('active');
            d.innerHTML = `<span class="station-name">${s.name}</span><span class="station-type">${typeText}</span><span style="margin-left: auto; font-size: 11px;">${distText}</span><span style="font-size:10px;color:#888;margin-left:6px;">${coordStr}</span><button class="station-del" data-idx="${i}" style="background:none;border:none;color:#ff4444;cursor:pointer;font-size:16px;margin-left:4px;line-height:1;">×</button>`;
            d.onclick = (e) => { if (e.target.classList.contains('station-del')) return; jumpToStation(i); };
            stationListDiv.appendChild(d);
        });
        // 删除站点事件
        stationListDiv.querySelectorAll('.station-del').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation();
                const idx = parseInt(e.target.dataset.idx);
                const route = getCurrentRouteObj();
                if (!route || route._stub) return;
                const stations = route.stations;
                if (stations.length <= 1) return;
                stations.splice(idx, 1);
                // 重新编号
                stations.forEach((st, j) => { st.index = j; });
                // 修正类型
                if (stations.length > 0) stations[0].type = '起点站';
                if (stations.length > 1) stations[stations.length - 1].type = '终点站';
                for (let j = 1; j < stations.length - 1; j++) stations[j].type = '小站';
                // 调整当前站索引
                if (currentStation > idx) currentStation--;
                else if (currentStation === idx) currentStation = Math.min(idx, stations.length - 1);
                if (targetStation > idx) targetStation--;
                else if (targetStation === idx) targetStation = Math.min(idx + 1, stations.length - 1);
                saveRouteCache();
                updateUI();
            };
        });
    }

    const presetStorageKey = 'gps_sensitivity_presets_v3';

    let presets = { 1: { exit:70, enter:35 }, 2: { exit:35, enter:70 }, 3: { exit:50, enter:50 }, 4: { exit:80, enter:80 }, 5: { exit:100, enter:100 } };
    function loadPresets() {

    function savePresets() { localStorage.setItem(presetStorageKey, JSON.stringify(presets)); }
    function applyPreset(num) {
        if (presets[num]) {
            exitSensitivity = presets[num].exit; enterSensitivity = presets[num].enter;
            exitSlider.value = exitSensitivity; exitVal.innerText = exitSensitivity;
            enterSlider.value = enterSensitivity; enterVal.innerText = enterSensitivity;
            saveCurrentSensitivity();
        }
    }
    function setPreset(num, exitValNum, enterValNum) {
        presets[num] = { exit: exitValNum, enter: enterValNum };
        savePresets();
        if (num===3) { document.getElementById('preset3Exit').value = exitValNum; document.getElementById('preset3Enter').value = enterValNum; }
        else if (num===4) { document.getElementById('preset4Exit').value = exitValNum; document.getElementById('preset4Enter').value = enterValNum; }
        else if (num===5) { document.getElementById('preset5Exit').value = exitValNum; document.getElementById('preset5Enter').value = enterValNum; }
    }
    function saveCurrentSensitivity() { localStorage.setItem(currentSensitivityKey, JSON.stringify({ exit: exitSensitivity, enter: enterSensitivity })); }
    function loadCurrentSensitivity() {
        try { const stored = localStorage.getItem(currentSensitivityKey); if (stored) { const { exit, enter } = JSON.parse(stored); if (typeof exit === 'number') { exitSensitivity = exit; enterSensitivity = enter; exitSlider.value = exit; exitVal.innerText = exit; enterSlider.value = enter; enterVal.innerText = enter; } } } catch(e) {}
    }

    // 折叠面板
    const panelHeader = document.getElementById('sensitivityHeader');
    const panelContent = document.getElementById('sensitivityContent');
    panelHeader.addEventListener('click', () => { panelHeader.classList.toggle('open'); panelContent.classList.toggle('open'); });

    // 公告
    const noticeBtn = document.getElementById('noticeBtn');
    const modal = document.getElementById('noticeModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const noticeBody = document.getElementById('noticeBody');
    function renderNoticeContent(text) {
        let html = text.replace(/\[([^\]]+)\]/g, (match, filename) => {
            const lower = filename.toLowerCase();
            if (lower.endsWith('.mp4')||lower.endsWith('.webm')||lower.endsWith('.ogg')) return `<video controls autoplay loop muted><source src="${filename}" type="video/mp4">不支持视频</video>`;
            else if (lower.endsWith('.jpg')||lower.endsWith('.jpeg')||lower.endsWith('.png')||lower.endsWith('.gif')||lower.endsWith('.webp')) return `<img src="${filename}" alt="图片">`;
            else return match;
        });
        html = html.replace(/\n/g, '<br>');
        noticeBody.innerHTML = html;
    }
    async function loadNotice() {
        try { const resp = await fetch('notice.tz'); if (resp.ok) renderNoticeContent(await resp.text()); else noticeBody.innerHTML = '暂无公告内容。'; } catch(e) { noticeBody.innerHTML = '无法加载公告。'; }
    }
    function showModal() { modal.style.display = 'block'; }
    function hideModal() { modal.style.display = 'none'; }
    function checkFirstVisit() { if (!localStorage.getItem('has_visited_notice_v1')) { localStorage.setItem('has_visited_notice_v1', 'true'); showModal(); } }

    // 解析站名和备注（·后面的为备注）
    function parseStationNameWithRemark(rawName) {
        if (!rawName) return { name: rawName, remark: '' };
        const dotIndex = rawName.indexOf('·');
        if (dotIndex === -1) return { name: rawName, remark: '' };
        return {
            name: rawName.substring(0, dotIndex).trim(),
            remark: rawName.substring(dotIndex + 1).trim()
        };
    }

    // 初始化
    async function init() {
        await loadPasswords();
        await loadAllRoutes(false, (p,t)=>updateProgress(p,t));
        populateRouteSelect();
        if (allRoutes.length) switchToRoute(0);
        loadPresets(); loadCurrentSensitivity();
        generalSlider.addEventListener('input', () => { generalSensitivity = +generalSlider.value; generalVal.innerText = generalSensitivity; });
        exitSlider.addEventListener('input', () => { exitSensitivity = +exitSlider.value; exitVal.innerText = exitSensitivity; saveCurrentSensitivity(); });
        enterSlider.addEventListener('input', () => { enterSensitivity = +enterSlider.value; enterVal.innerText = enterSensitivity; saveCurrentSensitivity(); });
        document.querySelectorAll('.preset-btn[data-preset]').forEach(btn => btn.addEventListener('click', () => applyPreset(parseInt(btn.dataset.preset))));
        document.querySelectorAll('.preset-save').forEach(btn => btn.addEventListener('click', () => {
            const preset = parseInt(btn.dataset.preset);
            let exitValNum = parseInt(document.getElementById(`preset${preset}Exit`).value);
            let enterValNum = parseInt(document.getElementById(`preset${preset}Enter`).value);
            if (isNaN(exitValNum)) exitValNum = 50; if (isNaN(enterValNum)) enterValNum = 50;
            if (exitValNum < 1) exitValNum = 1; if (exitValNum > 150) exitValNum = 150;
            if (enterValNum < 1) enterValNum = 1; if (enterValNum > 150) enterValNum = 150;
            setPreset(preset, exitValNum, enterValNum); applyPreset(preset);
        }));
        nextStopBtn.onclick = manualNext;
        replayBtn.onclick = replayAnnouncement;
        switchDirBtn.onclick = switchDirection;
        interruptBtn.onclick = interruptAudio;
        rescanBtn.onclick = async () => {
            if (isLoading) return;
            updateProgress(0, "全量重新扫描中...");
            await loadAllRoutes(true, (p,t) => updateProgress(p,t));
            populateRouteSelect();
            if (allRoutes.length) { routeSelect.selectedIndex = 0; switchToRoute(0); }
            updateProgress(100, "全量扫描完成");
            setTimeout(() => progressArea.style.display = 'none', 1000);
        };
        scanRouteBtn.onclick = async () => {
            if (isLoading) return;
            const route = getCurrentRouteObj();
            if (!route) return;
            const folder = route._stub ? route._folder : route.routeId.replace(/_(up|down)$/, '');
            await scanSingleRoute(folder);
        };
        reverseStationBtn.onclick = () => {
            const route = getCurrentRouteObj();
            if (!route || route._stub) return;
            // 找到当前文件夹的上下行两条线路，互换 stations 数据
            const folder = route.routeId.replace(/_(up|down)$/, '');
            const upRoute = allRoutes.find(r => r.routeId === folder + '_up');
            const downRoute = allRoutes.find(r => r.routeId === folder + '_down');
            if (!upRoute || !downRoute) return;
            // 互换站数据
            const tmp = upRoute.stations;
            upRoute.stations = downRoute.stations;
            downRoute.stations = tmp;
            // 修正 index
            upRoute.stations.forEach((st, j) => { st.index = j; });
            downRoute.stations.forEach((st, j) => { st.index = j; });
            currentStation = 0; targetStation = 1;
            autoEntered.clear(); autoLeft.clear();
            saveRouteCache();
            // 重新加载当前方向
            const routeIdx = allRoutes.findIndex(r => r.routeId === route.routeId);
            if (routeIdx !== -1) { routeSelect.selectedIndex = routeIdx; switchToRoute(routeIdx); }
        };
        routeSelect.addEventListener('change', () => { const idx = parseInt(routeSelect.value); if (!isNaN(idx)) switchToRoute(idx); });
        const routeSearch = document.getElementById('routeSearch');
        if (routeSearch) {
            routeSearch.addEventListener('input', () => {
                const keyword = routeSearch.value.trim().toLowerCase();
                for (const opt of routeSelect.options) {
                    const display = (opt.dataset.display || '').toLowerCase();
                    opt.style.display = (!keyword || display.includes(keyword)) ? '' : 'none';
                }
                if (routeSelect.selectedOptions[0]?.style.display === 'none') {
                    for (const opt of routeSelect.options) {
                        if (opt.style.display !== 'none') { routeSelect.value = opt.value; switchToRoute(parseInt(opt.value)); break; }
                    }
                }
            });
        }
        coordToggleSpan?.addEventListener('click', () => {
            useGcj02 = !useGcj02;
            if (coordToggleSpan) coordToggleSpan.innerText = useGcj02 ? 'GCJ-02' : 'WGS-84';
        });
        startGPS();
        await loadNotice();
        noticeBtn.onclick = showModal;
        closeModalBtn.onclick = hideModal;
        modal.addEventListener('click', (e) => { if (e.target === modal) hideModal(); });
        checkFirstVisit();
    }
    init();
})();
</script>
</body>
</html>
